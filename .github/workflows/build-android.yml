name: Build Flet Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        pip install flet==0.84.0
        pip install -r requirements.txt || echo "No requirements.txt"
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install Android NDK
      run: |
        sdkmanager --install "ndk;27.0.12077973" --channel=0
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
        
    - name: Verify Flutter
      run: |
        flutter --version
        flutter doctor -v
        
    - name: Create Flutter Project
      run: |
        export SERIOUS_PYTHON_SITE_PACKAGES="$(python -c 'import site; print(site.getsitepackages()[0])')"
        echo "SERIOUS_PYTHON_SITE_PACKAGES=$SERIOUS_PYTHON_SITE_PACKAGES"
        
        # Create Flutter project structure manually
        flutter create --project-name novel_reader --org com.example . || echo "Project already exists"
        
        # Copy main.py to project if needed
        if [ -f "main.py" ]; then
          echo "main.py exists"
        fi
        
    - name: Setup Flet Dependencies
      run: |
        # Modify existing pubspec.yaml to add flet dependencies
        sed -i 's/^dependencies:$/dependencies:\n  flet: ^0.84.0\n  serious_python: ^0.9.11/' pubspec.yaml || true
        
        # Show pubspec.yaml content
        cat pubspec.yaml
        
        # Get dependencies
        flutter pub get || echo "Pub get may have warnings"
        
    - name: Build APK
      run: |
        # Build APK directly with flutter
        flutter build apk --debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: novel-reader-apk
        path: |
          build/app/outputs/flutter-apk/*.apk
          build/apk/*.apk
        if-no-files-found: warn
        
    - name: Release APK
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/app/outputs/flutter-apk/*.apk
          build/apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
