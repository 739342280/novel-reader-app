name: Build Flet Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        pip install flet==0.84.0
        pip install -r requirements.txt || echo "No requirements.txt"
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install Android NDK
      run: |
        sdkmanager --install "ndk;27.0.12077973" --channel=0
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
        
    - name: Verify Flutter
      run: |
        flutter --version
        flutter doctor -v
        
    - name: Create Flet Project Structure
      run: |
        # Set SERIOUS_PYTHON_SITE_PACKAGES
        export SERIOUS_PYTHON_SITE_PACKAGES="$(python -c 'import site; print(site.getsitepackages()[0])')"
        echo "SERIOUS_PYTHON_SITE_PACKAGES=$SERIOUS_PYTHON_SITE_PACKAGES"
        
        # Create proper Flet project structure
        mkdir -p android/app/src/main/kotlin/com/example/novel_reader
        mkdir -p android/app/src/main/res
        
        # Create pubspec.yaml for Flet project
        cat > pubspec.yaml << 'EOF'
        name: novel_reader
        description: 小说智读 Android App
        publish_to: 'none'
        version: 1.0.0+1

        environment:
          sdk: '>=3.0.0 <4.0.0'

        dependencies:
          flutter:
            sdk: flutter
          flet: ^0.84.0
          serious_python: ^0.9.11
          cupertino_icons: ^1.0.2

        dev_dependencies:
          flutter_test:
            sdk: flutter
          flutter_lints: ^2.0.0

        flutter:
          uses-material-design: true
        EOF
        
        # Create main.dart that loads main.py
        mkdir -p lib
        cat > lib/main.dart << 'EOF'
        import 'package:flutter/material.dart';
        import 'package:flet/flet.dart';
        import 'package:serious_python/serious_python.dart';

        void main() async {
          WidgetsFlutterBinding.ensureInitialized();
          
          // Run Python main.py
          await SeriousPython.run("main.py");
          
          // Start Flet app
          runApp(FletApp(
            pageTitle: "小说智读",
          ));
        }
        EOF
        
        # Copy main.py to project root
        if [ -f "main.py" ]; then
          echo "main.py is ready"
          head -20 main.py
        fi
        
        # Get Flutter dependencies
        flutter pub get
        
    - name: Build APK
      run: |
        # Set SERIOUS_PYTHON_SITE_PACKAGES for the build
        export SERIOUS_PYTHON_SITE_PACKAGES="$(python -c 'import site; print(site.getsitepackages()[0])')"
        echo "SERIOUS_PYTHON_SITE_PACKAGES=$SERIOUS_PYTHON_SITE_PACKAGES"
        
        # Build APK with flutter
        flutter build apk --debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: novel-reader-apk
        path: |
          build/app/outputs/flutter-apk/*.apk
          build/apk/*.apk
        if-no-files-found: warn
        
    - name: Release APK
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/app/outputs/flutter-apk/*.apk
          build/apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
