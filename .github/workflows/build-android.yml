name: Build Flet Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Flet CLI
      run: |
        pip install flet==0.84.0
        pip install -r requirements.txt || true

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'

    - name: Set Python Site-Packages (关键！持久化环境变量)
      run: |
        echo "SERIOUS_PYTHON_SITE_PACKAGES=$(python -c 'import site; print(site.getsitepackages()[0])')" >> $GITHUB_ENV

    - name: (可选) 确保有 main.py(没有就创建一个示例)
      run: |
        if [ ! -f "main.py" ]; then
          cat > main.py << 'EOF'
import flet as ft

def main(page: ft.Page):
    page.title = "小说智读"
    page.add(ft.Text("Hello, 小说智读!", size=30))

ft.app(target=main)
EOF
        fi

    - name: 核心：直接用 Flet 构建 APK
      run: |
        # 这一条命令会自动处理：
        # 1. 创建 Flutter 项目结构
        # 2. 生成 pubspec.yaml
        # 3. 嵌入 Python 环境 (serious_python)
        # 4. 编译出最终 APK
        flet build apk --no-pub

    - name: 上传 APK 产物
      uses: actions/upload-artifact@v4
      with:
        name: novel-reader-apk
        path: build/apk/*.apk
        if-no-files-found: error

    - name: 推送 Tag 时自动发布 Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: build/apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
