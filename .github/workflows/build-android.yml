name: Build Flet Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Flet CLI
      run: |
        pip install flet==0.84.0
        pip install -r requirements.txt || true

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'

    - name: Set Python Site-Packages
      run: |
        echo "SERIOUS_PYTHON_SITE_PACKAGES=$(python -c 'import site; print(site.getsitepackages()[0])')" >> $GITHUB_ENV

    - name: Ensure main.py exists
      run: |
        if [ ! -f "main.py" ]; then
          echo "import flet as ft" > main.py
          echo "" >> main.py
          echo "def main(page: ft.Page):" >> main.py
          echo "    page.title = '小说智读'" >> main.py
          echo "    page.add(ft.Text('Hello, 小说智读!', size=30))" >> main.py
          echo "" >> main.py
          echo "ft.app(target=main)" >> main.py
        fi
        cat main.py

    - name: Build APK with Flet
      run: |
        flet build apk --no-pub

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: novel-reader-apk
        path: build/apk/*.apk
        if-no-files-found: error

    - name: Release on Tag
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: build/apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
