name: Build Flet Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install flet==0.84.0
        pip install -r requirements.txt || echo "No requirements.txt"
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Android NDK
      run: |
        sdkmanager --install "ndk;27.0.12077973" --channel=0
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
    
    - name: Verify Flutter
      run: |
        flutter --version
        flutter doctor -v
    
    - name: Build Flet APK
      run: |
        export SERIOUS_PYTHON_SITE_PACKAGES="$(python -c 'import site; print(site.getsitepackages()[0])')"
        echo "SERIOUS_PYTHON_SITE_PACKAGES=$SERIOUS_PYTHON_SITE_PACKAGES"
        
        if [ ! -f main.py ]; then
          cp "小说智读-0.3.6.py" main.py 2>/dev/null || cp "小说智读-0.3.5.py" main.py 2>/dev/null || echo "Using existing main.py"
        fi
        
        flet build apk --product "小说智读" --build-version "0.3.6" --build-number 1 --org "com.shoubeier" --verbose
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: novel-reader-apk
        path: |
          build/app/outputs/flutter-apk/*.apk
          build/apk/*.apk
        if-no-files-found: warn
    
    - name: Release APK
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/app/outputs/flutter-apk/*.apk
          build/apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}