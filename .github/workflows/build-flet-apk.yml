name: Build Flet Android APK

on:
  push:
    branches: [ master ]
    tags: 
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:          

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Extract Version from main.py
      id: extract_version
      run: |
        VERSION=$(grep -oP 'self\.version\s*=\s*"\K[^"]+' main.py | head -n 1)
        if [ -z "$VERSION" ]; then
          VERSION="Unknown"
        fi
        echo "Extracted version: $VERSION"
        echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' 
    
    - name: Install dependencies
      run: |
        pip install flet==0.84.0
        pip install -r requirements.txt || echo "No requirements.txt"
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Android NDK
      run: |
        sdkmanager --install "ndk;27.0.12077973" --channel=0
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.4'  
        channel: 'stable'
        cache: true 
    
    - name: Verify Flutter
      run: |
        flutter --version
        flutter doctor -v
        
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/release.keystore
    
    - name: Build Flet APK
      run: |
        export SERIOUS_PYTHON_SITE_PACKAGES="$(python -c 'import site; print(site.getsitepackages()[0])')"
        echo "SERIOUS_PYTHON_SITE_PACKAGES=$SERIOUS_PYTHON_SITE_PACKAGES"
        
        flet build apk --product "小说智读" --build-version "${{ env.APP_VERSION }}" --build-number ${{ github.run_number }} --org "com.shoubeier" --template https://github.com/flet-dev/flet-build-template/archive/refs/tags/v0.84.0.zip --android-signing-key-store $GITHUB_WORKSPACE/release.keystore --android-signing-key-alias novelkey --android-signing-key-store-password novel2026 --android-signing-key-password novel2026 --verbose
    
    - name: Rename APK
      run: |
        mv build/apk/*.apk "小说智读_v${{ env.APP_VERSION }}.apk" 2>/dev/null || mv build/app/outputs/flutter-apk/app-release.apk "小说智读_v${{ env.APP_VERSION }}.apk" 2>/dev/null
        echo "APK renamed successfully!"
    
    # 【核心升级】：使用 2026 年最新版 v7 特性，直接上传单体 APK 文件
    - name: Upload APK
      uses: actions/upload-artifact@v7
      with:
        path: 小说智读_v*.apk                 
        archive: false    # 关闭强制 ZIP 压缩
        if-no-files-found: warn
    
    - name: Release APK
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: 小说智读_v*.apk
        name: 小说智读 v${{ env.APP_VERSION }}
        body: "小说智读 v${{ env.APP_VERSION }} 自动构建发布。"
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}