name: Build Flet Android APK

on:
  push:
    branches: [ master ]
    paths:
      - 'main.py'             # 只有当 main.py 发生代码变动时，才自动触发打包
      - 'requirements.txt'
  pull_request:
    branches: [ master ]
  workflow_dispatch:          # 永远保留手动触发按钮

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Extract Version from main.py
      id: extract_version
      run: |
        # 使用正则从 main.py 中自动提取 self.version 的值 (例如 0.3.8)
        VERSION=$(grep -oP 'self\.version\s*=\s*"\K[^"]+' main.py | head -n 1)
        if [ -z "$VERSION" ]; then
          VERSION="Unknown"
        fi
        echo "Extracted version: $VERSION"
        # 写入环境变量供后续步骤使用
        echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # 开启 pip 缓存
    
    - name: Install dependencies
      run: |
        pip install flet==0.84.0
        pip install -r requirements.txt || echo "No requirements.txt"
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle' # 开启 Gradle 缓存，极大缩短安卓底层编译时间
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Android NDK
      run: |
        sdkmanager --install "ndk;27.0.12077973" --channel=0
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
        cache: true # 开启 Flutter SDK 缓存
    
    - name: Verify Flutter
      run: |
        flutter --version
        flutter doctor -v
    
    - name: Build Flet APK
      run: |
        export SERIOUS_PYTHON_SITE_PACKAGES="$(python -c 'import site; print(site.getsitepackages()[0])')"
        echo "SERIOUS_PYTHON_SITE_PACKAGES=$SERIOUS_PYTHON_SITE_PACKAGES"
        
        # 移除了以前多余的 cp 复制逻辑，直接使用根目录的 main.py
        # 版本号动态引用 APP_VERSION，构建号动态使用 github 运行次数
        flet build apk --product "小说智读" --build-version "${{ env.APP_VERSION }}" --build-number ${{ github.run_number }} --org "com.shoubeier" --verbose
    
    - name: Rename APK
      run: |
        # Flet 编译出的包通常在 build/apk 目录下
        # 找到它并重命名为带有版本号的格式
        mv build/apk/*.apk "小说智读_v${{ env.APP_VERSION }}.apk" 2>/dev/null || mv build/app/outputs/flutter-apk/app-release.apk "小说智读_v${{ env.APP_VERSION }}.apk" 2>/dev/null
        echo "APK renamed successfully!"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 小说智读_v${{ env.APP_VERSION }} # 云端产物的显示名称也会带上版本号
        path: 小说智读_v*.apk                 # 只上传重命名后的成品包
        if-no-files-found: warn
    
    - name: Release APK
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: 小说智读_v*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
