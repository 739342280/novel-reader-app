name: Build Flet Android APK

on:
  push:
    branches: [ master ]
    paths:
      - 'main.py'             
      - 'requirements.txt'
  pull_request:
    branches: [ master ]
  workflow_dispatch:          

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Extract Version from main.py
      id: extract_version
      run: |
        VERSION=$(grep -oP 'self\.version\s*=\s*"\K[^"]+' main.py | head -n 1)
        if [ -z "$VERSION" ]; then
          VERSION="Unknown"
        fi
        echo "Extracted version: $VERSION"
        echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' 
    
    - name: Install dependencies
      run: |
        pip install flet==0.84.0
        pip install -r requirements.txt || echo "No requirements.txt"
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        # 【修正点】：移除了 cache: 'gradle'，因为 Flet 此时还未生成安卓原生配置文件
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Android NDK
      run: |
        sdkmanager --install "ndk;27.0.12077973" --channel=0
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
        cache: true # Flutter 的缓存正常保留
    
    - name: Verify Flutter
      run: |
        flutter --version
        flutter doctor -v
    
    - name: Build Flet APK
      run: |
        export SERIOUS_PYTHON_SITE_PACKAGES="$(python -c 'import site; print(site.getsitepackages()[0])')"
        echo "SERIOUS_PYTHON_SITE_PACKAGES=$SERIOUS_PYTHON_SITE_PACKAGES"
        
        flet build apk --product "小说智读" --build-version "${{ env.APP_VERSION }}" --build-number ${{ github.run_number }} --org "com.shoubeier" --verbose
    
    - name: Rename APK
      run: |
        mv build/apk/*.apk "小说智读_v${{ env.APP_VERSION }}.apk" 2>/dev/null || mv build/app/outputs/flutter-apk/app-release.apk "小说智读_v${{ env.APP_VERSION }}.apk" 2>/dev/null
        echo "APK renamed successfully!"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 小说智读_v${{ env.APP_VERSION }} 
        path: 小说智读_v*.apk                 
        if-no-files-found: warn
    
    - name: Release APK
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: 小说智读_v*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
